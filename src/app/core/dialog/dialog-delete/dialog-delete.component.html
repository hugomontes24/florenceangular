<h2 mat-dialog-title>Suppression</h2>
<mat-dialog-content>
    Voulez-vous supprimer cette reservation
</mat-dialog-content>
<mat-dialog-actions align="end">
    <button mat-button (click)="onDismiss()">Non</button>
    <button mat-raised-button (click)="onConfirm()">Oui</button>
</mat-dialog-actions>
